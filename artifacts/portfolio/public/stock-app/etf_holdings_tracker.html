<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETF 持股變動追蹤</title>
  <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
  <style>
    :root {
      --bg:#0f0f23; --bg2:#1a1a3e; --bg3:#1e1e42; --txt:#e0e0ff; --txt2:#8888aa;
      --green:#00c853; --red:#ff1744; --orange:#ff9100;
      --blue:#448aff; --cyan:#00bcd4; --bdr:#2a2a5a;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { overflow-x:hidden; max-width:100%; }
    body { background:var(--bg); color:var(--txt); font-family:'Segoe UI','Microsoft JhengHei',sans-serif; min-height:100vh; }
    .header { background:linear-gradient(135deg,var(--bg2),#12122e); padding:14px 24px;
      display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
      border-bottom:1px solid var(--bdr); position:sticky; top:0; z-index:10; }
    .header h1 { font-size:18px; background:linear-gradient(90deg,var(--blue),var(--cyan));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; white-space:nowrap; }
    .nav { display:flex; gap:8px; flex-wrap:wrap; }
    .nav a { color:var(--txt2); text-decoration:none; padding:6px 12px; border-radius:6px;
      border:1px solid var(--bdr); font-size:13px; transition:all .2s; white-space:nowrap; }
    .nav a:hover { color:var(--cyan); border-color:var(--cyan); }
    .nav a.active { background:var(--cyan); color:#000; font-weight:700; }

    .container { max-width:1100px; margin:24px auto; padding:0 16px; }
    .panel { background:var(--bg2); border:1px solid var(--bdr); border-radius:10px;
      padding:18px; margin-bottom:18px; }
    .panel h2 { color:var(--cyan); font-size:14px; margin-bottom:12px; font-weight:600; }
    /* 表格容器：包住會跑出邊界的 table（snapBox, diffBox 等） */
    #snapBox, #diffBox { overflow-x:auto; -webkit-overflow-scrolling:touch; }

    .controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    select, input { background:var(--bg); color:var(--txt); border:1px solid var(--bdr);
      padding:8px 12px; border-radius:6px; font-size:13px; }
    select:focus, input:focus { outline:none; border-color:var(--cyan); }
    button { padding:8px 16px; border:none; border-radius:6px; font-size:13px;
      cursor:pointer; font-weight:600; color:#fff; background:var(--blue); transition:all .2s; }
    button:hover:not(:disabled) { opacity:.85; }
    button:disabled { opacity:.4; cursor:not-allowed; }

    table { width:100%; border-collapse:collapse; background:var(--bg2);
      border-radius:8px; overflow:hidden; min-width:560px; }
    th, td { padding:9px 12px; text-align:left; border-bottom:1px solid var(--bdr); font-size:13px;
      vertical-align:top; }
    th { background:var(--bg3); color:var(--cyan); font-weight:600; white-space:nowrap; }
    .code { color:var(--txt2); font-family:monospace; white-space:nowrap; }
    .name { color:var(--txt); font-weight:600; }
    .pos { color:var(--green); font-weight:600; }
    .neg { color:var(--red); font-weight:600; }
    .pill { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px;
      background:var(--bg3); color:var(--txt2); border:1px solid var(--bdr); }
    .pill-add { background:#003d24; color:#69f0ae; border-color:#005a36; }
    .pill-rm { background:#3d0019; color:#ff80ab; border-color:#5a0028; }
    .reso { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700;
      border:1px solid var(--bdr); }
    .reso-up   { background:#3d0019; color:#ff80ab; border-color:#5a0028; }   /* ETF 加碼 + 外資買，強多 */
    .reso-down { background:#003d24; color:#69f0ae; border-color:#005a36; }   /* ETF 減碼 + 外資賣，強空 */
    .reso-div  { background:var(--bg3); color:var(--txt2); border-color:var(--bdr); }
    .filter-bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:10px; font-size:12px; }
    .filter-bar label { color:var(--txt2); cursor:pointer; user-select:none; }
    .filter-bar input[type=checkbox] { vertical-align:middle; margin-right:4px; }
    .empty { color:var(--txt2); padding:30px; text-align:center; font-size:14px; }
    #status { color:var(--txt2); font-size:13px; margin-top:8px; min-height:18px; }

    /* ── 個股新聞 AI 掃描 ── */
    button.secondary { background:#5a5a8a; }
    .badge { display:inline-block; padding:2px 9px; border-radius:10px; font-size:11px; font-weight:600; }
    .b-bull { background:#3d0019; color:#ff80ab; border:1px solid #5a0028; }
    .b-bear { background:#003d24; color:#69f0ae; border:1px solid #005a36; }
    .b-neu  { background:var(--bg3); color:var(--txt2); border:1px solid var(--bdr); }
    .stat-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
    .stat { background:var(--bg3); border:1px solid var(--bdr); padding:6px 12px; border-radius:6px; font-size:12px; color:var(--txt2); }
    .stat b { color:var(--txt); margin-left:4px; }
    .scan-card { border:1px solid var(--bdr); background:var(--bg); border-radius:8px; padding:12px 14px; margin-bottom:8px; }
    .scan-head { display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:13px; }
    .scan-head .stk { color:var(--txt); font-weight:600; }
    .scan-head .muted { color:var(--txt2); font-size:11px; }
    .scan-reason { color:var(--txt2); font-size:12px; margin-top:6px; }
    .toggle-news { background:none; color:var(--cyan); padding:0; font-size:12px; font-weight:500; cursor:pointer; margin-top:6px; }
    .toggle-news:hover { text-decoration:underline; }
    .news-list { display:none; margin-top:8px; padding-left:12px; border-left:2px solid var(--bdr); }
    .news-list.open { display:block; }
    .news-item { padding:5px 0; font-size:12px; border-bottom:1px dashed var(--bdr); }
    .news-item:last-child { border-bottom:none; }
    .news-item a { color:var(--blue); text-decoration:none; }
    .news-item a:hover { text-decoration:underline; }
    .news-item .news-meta { color:var(--txt2); font-size:11px; margin-left:4px; }
    .progress-bar { height:6px; background:var(--bg3); border-radius:6px; overflow:hidden; margin-top:8px; }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--blue),var(--cyan)); transition:width .3s; width:0%; }
    .alert-warn { background:#3d2200; border:1px solid #ff9100; color:#ffb74d; padding:8px 12px; border-radius:6px; font-size:12px; margin-bottom:10px; }

    @media (max-width: 640px) {
      .header { padding:10px 14px; gap:8px; }
      .header h1 { font-size:15px; }
      .nav a { padding:5px 9px; font-size:12px; }
      .container { margin:14px auto; padding:0 10px; }
      .panel { padding:12px; margin-bottom:12px; }
      .panel h2 { font-size:13px; }
      .controls select, .controls input, .controls button { font-size:12px; padding:7px 10px; }
      th, td { padding:7px 8px; font-size:12px; }
      table { min-width:520px; }
      .pill { font-size:9px; padding:1px 6px; }
      .stat { font-size:11px; padding:5px 9px; }
      .scan-card { padding:10px; }
    }
  </style>
</head>

  <script>
    function getCode() {
      return document.getElementById('etfSelect').value.replace('.TW','');
    }

    function setStatus(msg, color) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.style.color = color || 'var(--txt2)';
    }

    async function loadAll() {
      await Promise.all([loadSnapshots(), loadDiff()]);
    }

    async function loadSnapshots() {
      const code = getCode();
      const box = document.getElementById('snapBox');
      box.innerHTML = '<div class="empty">載入中…</div>';
      try {
        const r = await fetch(`/api/etf_holdings/snapshots/${code}?limit=30`);
        const d = await r.json();
        if (!d.ok || !d.snapshots.length) {
          box.innerHTML = '<div class="empty">無快照（請先「立即抓快照」）</div>';
          return;
        }
        box.innerHTML = `<table><thead><tr>
          <th>ID</th><th>時間</th><th>來源</th><th>持股數</th>
        </tr></thead><tbody>${d.snapshots.map(s => `
          <tr>
            <td class="code">${s.id}</td>
            <td>${s.fetched_at}</td>
            <td><span class="pill">${s.source}</span></td>
            <td>${s.holding_count}</td>
          </tr>`).join('')}</tbody></table>`;
      } catch (e) {
        box.innerHTML = `<div class="empty" style="color:var(--red)">載入失敗：${e}</div>`;
      }
    }

    async function loadDiff() {
      const code = getCode();
      const box = document.getElementById('diffBox');
      box.innerHTML = '<div class="empty">載入中…</div>';
      try {
        const r = await fetch(`/api/etf_holdings/diff/${code}`);
        const d = await r.json();
        if (d.status === 'no_diff') {
          box.innerHTML = `<div class="empty">${d.message}（目前 ${d.snapshot_count || 0} 筆快照）</div>`;
          return;
        }
        if (d.status === 'error') {
          box.innerHTML = `<div class="empty" style="color:var(--red)">${d.message}</div>`;
          return;
        }
        const s = d.summary;
        const esc = (str) => String(str==null?'':str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        const summary = `
          <div style="margin-bottom:12px;color:var(--txt2);font-size:13px;line-height:1.8">
            <div>本次：<span style="color:var(--txt)">${esc(d.new_time)}</span></div>
            <div>上次：<span style="color:var(--txt)">${esc(d.old_time)}</span></div>
            <div style="margin-top:6px">
              <span class="pill pill-add">🆕 新增 ${s.added}</span>
              <span class="pill pill-rm">❌ 移除 ${s.removed}</span>
              <span class="pill">📊 變動 ${s.changed}</span>
              <span class="pill">⏸ 不變 ${s.unchanged}</span>
            </div>
          </div>`;
        const rows = d.holdings.map(h => {
          let tag, chg;
          if (h.status === 'added') {
            tag = '<span class="pill pill-add">新增</span>';
            chg = `<span class="pos">+${(h.new_weight||0).toFixed(2)}%</span>`;
          } else if (h.status === 'removed') {
            tag = '<span class="pill pill-rm">移除</span>';
            chg = `<span class="neg">-${(h.old_weight||0).toFixed(2)}%</span>`;
          } else if (h.status === 'unchanged') {
            tag = '<span class="pill">不變</span>';
            chg = `<span style="color:var(--txt2)">±0.00%</span>`;
          } else {
            tag = '<span class="pill">變動</span>';
            const cls = h.change > 0 ? 'pos' : 'neg';
            const sign = h.change > 0 ? '+' : '';
            chg = `<span class="${cls}">${sign}${h.change.toFixed(2)}%</span>`;
          }
          const ow = h.old_weight !== null ? h.old_weight.toFixed(2)+'%' : '—';
          const nw = h.new_weight !== null ? h.new_weight.toFixed(2)+'%' : '—';
          // 外資 5 日合計（張）
          let foreignCell = '<span style="color:var(--txt2)">—</span>';
          if (typeof h.foreign_5d === 'number') {
            const v = h.foreign_5d;
            const cls = v > 0 ? 'pos' : (v < 0 ? 'neg' : '');
            const sign = v > 0 ? '+' : '';
            foreignCell = `<span class="${cls}">${sign}${v.toLocaleString()}</span>`;
          }
          // 共振訊號
          let resoCell = '';
          let resoKey = '';
          if (h.resonance === 'up') { resoCell = '<span class="reso reso-up" title="ETF 加碼 + 外資買超">↑↑ 強多</span>'; resoKey = 'up'; }
          else if (h.resonance === 'down') { resoCell = '<span class="reso reso-down" title="ETF 減碼 + 外資賣超">↓↓ 強空</span>'; resoKey = 'down'; }
          else if (h.resonance === 'div_up') { resoCell = '<span class="reso reso-div" title="ETF 加碼但外資賣超（背離）">↑↓ 背離</span>'; resoKey = 'div'; }
          else if (h.resonance === 'div_down') { resoCell = '<span class="reso reso-div" title="ETF 減碼但外資買超（背離）">↓↑ 背離</span>'; resoKey = 'div'; }
          const codeStr = h.stock_code ? esc(h.stock_code) : '';
          const nameStr = h.stock_name ? esc(h.stock_name) : '';
          const codeCell = codeStr
            ? `<a href="index.html?code=${encodeURIComponent(h.stock_code)}" target="_blank" rel="noopener" style="color:var(--cyan,#00bcd4);text-decoration:none;font-weight:700;" title="查看 K 線圖">${codeStr}</a>`
            : '—';
          const nameCell = (codeStr && nameStr)

    async function pollBatchSnap() {
      if (_batchSnapTimer) clearInterval(_batchSnapTimer);
      _batchSnapTimer = setInterval(async () => {
        try {
          const r = await fetch('/api/etf_holdings/snapshot_all/status');
          const s = await r.json();
          const meta = document.getElementById('batchSnapMeta');
          const bar = document.getElementById('batchSnapBar');
          const det = document.getElementById('batchSnapDetail');
          const pct = s.total > 0 ? Math.round(s.done / s.total * 100) : 0;
          bar.style.width = pct + '%';
          if (s.running) {
            meta.textContent = `進度 ${s.done}/${s.total}（${pct}%）　目前：${s.current || '-'}　成功 ${s.ok_count}　失敗 ${s.fail_count}`;
          } else {
            clearInterval(_batchSnapTimer); _batchSnapTimer = null;
            const okMsg = s.error ? '錯誤：' + s.error : '完成';
            meta.style.color = s.fail_count > 0 ? 'var(--orange)' : 'var(--green)';
            meta.textContent = `${okMsg}　共 ${s.total} 檔，成功 ${s.ok_count}　失敗 ${s.fail_count}`;
            if (s.failed_codes && s.failed_codes.length) {
              det.textContent = '失敗清單：' + s.failed_codes.join(', ');
            } else {
              det.textContent = '';
            }

            loadAll();
          }
        } catch (e) {
          console.warn('查詢批次狀態失敗', e);
        }

    function el(tag, opts = {}, children = []) {
      const e = document.createElement(tag);
      if (opts.cls) e.className = opts.cls;
      if (opts.text != null) e.textContent = opts.text;
      if (opts.attrs) for (const k in opts.attrs) e.setAttribute(k, opts.attrs[k]);
      (children || []).forEach(c => c && e.appendChild(c));
      return e;
    }

    function aiBadgeEl(label) {
      const map = { '利多': 'b-bull', '中性': 'b-neu', '利空': 'b-bear' };
      const safe = (label === '利多' || label === '中性' || label === '利空') ? label : '中性';
      return el('span', { cls: 'badge ' + (map[safe] || 'b-neu'), text: safe });
    }

    function safeUrl(url) {
      if (typeof url !== 'string') return '#';
      try {
        const u = new URL(url, window.location.origin);
        return (u.protocol === 'http:' || u.protocol === 'https:') ? u.href : '#';
      } catch (e) { return '#'; }
    }

    function resetScanUI() {
      document.getElementById('scanBarWrap').style.display = 'none';
      document.getElementById('scanBar').style.width = '0%';
      document.getElementById('scanMeta').textContent = '尚未掃描';
      document.getElementById('scanSummary').replaceChildren();
      document.getElementById('scanResults').innerHTML =
        '<div class="empty">點「開始掃描」對前 10 大持股做新聞 + AI 情緒判讀（約 30~60 秒）</div>';
    }

    function renderScanResult(result) {
      const sumBox = document.getElementById('scanSummary');
      const resBox = document.getElementById('scanResults');
      const s = result.summary || {};

      sumBox.replaceChildren();
      const mkStat = (label, val) => {
        const d = el('div', { cls: 'stat' });
        d.appendChild(document.createTextNode(label));
        d.appendChild(el('b', { text: String(val) }));
        return d;
      };
      sumBox.appendChild(mkStat('掃描時間：', result.scanned_at || '—'));
      sumBox.appendChild(mkStat('利多 ', s.bullish || 0));
      sumBox.appendChild(mkStat('中性 ', s.neutral || 0));
      sumBox.appendChild(mkStat('利空 ', s.bearish || 0));

      resBox.replaceChildren();
      if (s.ai_available === false) {
        resBox.appendChild(el('div', {
          cls: 'alert-warn',
          text: '未偵測到 OPENAI_API_KEY，AI 判讀已退回到本地關鍵字評分。'
        }));
      }

      const rows = result.results || [];
      if (rows.length === 0) {
        resBox.appendChild(el('div', { cls: 'empty', text: '無資料' }));
        return;
      }

      rows.forEach((r, idx) => {
        const ai = r.ai || {};
        const conf = ai.confidence != null ? ` ${(ai.confidence * 100).toFixed(0)}%` : '';
        const srcTag = ai.source === 'ai' ? 'AI' : ai.source === 'fallback' ? '本地' : '—';
        const wt = r.weight != null ? r.weight.toFixed(2) + '%' : '—';

        const card = el('div', { cls: 'scan-card' });
        const head = el('div', { cls: 'scan-head' });
        head.appendChild(el('span', { cls: 'stk', text: `${r.stock_code || '—'} ${r.stock_name || ''}` }));
        head.appendChild(aiBadgeEl(ai.label));
        head.appendChild(el('span', {
          cls: 'muted',
          text: `${srcTag}${conf} · 權重 ${wt} · 新聞 ${r.news_count || 0} 則`
        }));
        card.appendChild(head);
        card.appendChild(el('div', { cls: 'scan-reason', text: '理由：' + (ai.reason || '—') }));

        const newsId = `etf-news-${idx}`;
        const toggleBtn = el('button', {
          cls: 'toggle-news',
          attrs: { 'data-target': newsId, 'type': 'button' },
          text: '展開新聞 ▾'
        });
        card.appendChild(toggleBtn);

        const newsBox = el('div', { cls: 'news-list', attrs: { id: newsId } });
        const news = r.news || [];
        if (news.length === 0) {
          newsBox.appendChild(el('div', { cls: 'news-item', text: '無近期新聞' }));
        } else {
          news.forEach(n => {
            const item = el('div', { cls: 'news-item' });
            item.appendChild(aiBadgeEl(n.sentiment_label));
            item.appendChild(document.createTextNode(' '));
            const a = el('a', {
              text: n.title || '(無標題)',
              attrs: { href: safeUrl(n.link), target: '_blank', rel: 'noopener noreferrer' },
            });
            item.appendChild(a);
            const time = n.hours_ago != null ? `${n.hours_ago} 小時前` : '近期';
            const src = n.source ? ` · ${n.source}` : '';
            item.appendChild(el('span', { cls: 'news-meta', text: ` ${time}${src}` }));
            newsBox.appendChild(item);
          });
        }
        card.appendChild(newsBox);
        resBox.appendChild(card);
      });

      resBox.querySelectorAll('.toggle-news').forEach(btn => {
        btn.addEventListener('click', () => {
          const tgt = document.getElementById(btn.dataset.target);
          tgt.classList.toggle('open');
          btn.textContent = tgt.classList.contains('open') ? '收合新聞 ▴' : '展開新聞 ▾';
        });
      });

    function pollScan(taskId) {
      if (_scanTimer) clearInterval(_scanTimer);
      _scanTimer = setInterval(async () => {
        try {
          const r = await fetch(`/api/etf_holdings/stock_scan/status/${taskId}`);
          const d = await r.json();
          if (!d.ok) {
            setStatus('查詢失敗：' + (d.msg || '未知錯誤'), 'var(--red)');
            clearInterval(_scanTimer);
            return;
          }
          const pct = d.total ? Math.round((d.done / d.total) * 100) : 0;
          document.getElementById('scanBar').style.width = pct + '%';
          const stepLabel = {
            queued: '排隊中', load_holdings: '讀取持股',
            fetch_news: '抓新聞', ai: 'AI 判讀', done: '完成',
          }[d.step] || d.step;
          document.getElementById('scanMeta').textContent = `[${stepLabel}] ${d.done || 0} / ${d.total || 10}`;

          if (d.status === 'done' && d.result) {
            clearInterval(_scanTimer);
            document.getElementById('scanBarWrap').style.display = 'none';
            renderScanResult(d.result);
            document.getElementById('btnScan').disabled = false;
            document.getElementById('btnScanForce').disabled = false;
            setStatus('掃描完成', 'var(--green)');
          } else if (d.status === 'error') {

            document.getElementById('scanBarWrap').style.display = 'none';

            errBox.replaceChildren(el('div', { cls: 'alert-warn', text: (d.error || '掃描失敗') }));
            document.getElementById('btnScan').disabled = false;
            document.getElementById('btnScanForce').disabled = false;
          }
        } catch (e) {
          clearInterval(_scanTimer);
          setStatus('輪詢失敗：' + e.message, 'var(--red)');
          document.getElementById('scanBarWrap').style.display = 'none';
          document.getElementById('btnScan').disabled = false;
          document.getElementById('btnScanForce').disabled = false;
        }
      }, 1500);
    }

          document.getElementById('adhocScanBarWrap').style.display = 'none';
          document.getElementById('adhocScanMeta').textContent = d.msg || '啟動失敗';
          document.getElementById('adhocScanResults').innerHTML =
            '<div class="alert-warn">' + (d.msg || '啟動失敗') + '</div>';
          btn1.disabled = false; btn2.disabled = false;
          refreshAdhocQuota();
          return;
        }
        if (d.cached && d.result) {
          document.getElementById('adhocScanBarWrap').style.display = 'none';
          document.getElementById('adhocScanMeta').textContent = '（30 分鐘內快取結果）';
          renderAdhocResult(d.result);
          btn1.disabled = false; btn2.disabled = false;
          return;
        }
        if (d.task_id) {
          if (d.resolved) {
            const labels = d.resolved.map(x => `${x.stock_code || ''} ${x.stock_name || ''}`.trim());
            document.getElementById('adhocScanMeta').textContent = `已解析 ${labels.length} 檔：${labels.join('、')}`;
          }
          pollAdhocScan(d.task_id);
        } else {
          document.getElementById('adhocScanMeta').textContent = d.msg || '啟動失敗';
          btn1.disabled = false; btn2.disabled = false;
        }
      } catch (e) {
        document.getElementById('adhocScanMeta').textContent = '請求失敗：' + e.message;
        btn1.disabled = false; btn2.disabled = false;
      }
    }

    document.getElementById('btnAdhocScan').addEventListener('click', () => startAdhocScan(false));
    document.getElementById('btnAdhocScanForce').addEventListener('click', () => startAdhocScan(true));
    loadStockOptionsDatalist();
    refreshAdhocQuota();
  </script>
</body>
</html>
